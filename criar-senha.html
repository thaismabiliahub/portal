<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affection Portal · Criar sua senha</title>
<link rel="icon" type="image/png" href="icons/borboleta.png">
<link rel="apple-touch-icon" href="icons/borboleta.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#532137">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; font-family: 'DM Sans', system-ui, sans-serif; color: #1a1a18; }
body {
    background: linear-gradient(135deg, #73304e 0%, #532137 60%, #3a1820 100%);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
}
.card {
    background: white; border-radius: 18px;
    padding: 40px 36px 32px;
    width: 100%; max-width: 440px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.borboleta { display: block; margin: 0 auto 10px; }
.titulo {
    text-align: center;
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px; font-weight: 600;
    color: #1a1a18; line-height: 1.3;
    margin-bottom: 8px;
}
.sub { text-align: center; font-size: 14px; color: #6b6660; margin-bottom: 24px; line-height: 1.55; }
.label { display: block; font-size: 11px; font-weight: 600; color: #6b6660; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
.campo { position: relative; margin-bottom: 12px; }
input[type="password"], input[type="text"] {
    width: 100%;
    padding: 11px 38px 11px 12px;
    border: 1.5px solid #ebe5df;
    border-radius: 8px;
    font-size: 14px; font-family: inherit;
    outline: none; transition: border-color 0.15s;
}
input:focus { border-color: #532137; }
.olho {
    position: absolute; right: 8px; top: 50%;
    transform: translateY(-50%);
    background: transparent; border: none;
    cursor: pointer; padding: 6px;
}
.olho svg { width: 18px; height: 18px; stroke: #9a948c; }
.erro { color: #8b3a3a; font-size: 12.5px; min-height: 18px; margin: 4px 0 14px; }
.btn-pri {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, #6a2a47 0%, #532137 60%, #3a1820 100%);
    color: white; border: 1px solid rgba(83,33,55,0.4);
    border-radius: 10px; font-size: 14px; font-weight: 600;
    font-family: inherit; cursor: pointer;
    box-shadow: 0 1px 2px rgba(83,33,55,0.18), 0 4px 14px -4px rgba(83,33,55,0.35), inset 0 1px 0 rgba(255,255,255,0.12);
    transition: all 0.15s ease;
}
.btn-pri:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.05); }
.btn-pri:disabled { opacity: 0.6; cursor: not-allowed; }
.disclaimer { font-size: 11px; color: #9a948c; text-align: center; margin: 18px 0 0; line-height: 1.55; }
.carregando { text-align: center; color: #6b6660; padding: 40px 0; }
.sucesso { text-align: center; padding: 20px 0; }
.sucesso .ok { color: #5c7c5c; font-size: 40px; line-height: 1; margin-bottom: 12px; }
</style>
</head>
<body>
    <div class="card" id="card">
        <div class="carregando" id="carregando">
            <p>Conferindo seu convite...</p>
        </div>
    </div>

<script>
(async () => {
    const SB = supabase.createClient(window.AFFECTION_CONFIG.SUPABASE_URL, window.AFFECTION_CONFIG.SUPABASE_ANON_KEY);

    // Pega tokens do hash (Supabase Auth coloca na URL apos verify)
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    const type = params.get('type');

    if (accessToken && refreshToken) {
        await SB.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
    }

    // Confere sessao
    const { data: { session } } = await SB.auth.getSession();
    if (!session) {
        document.getElementById('card').innerHTML = `
            <div style="text-align:center; font-family:'Fraunces',Georgia,serif; color:#532137; font-size:15px; font-weight:600; letter-spacing:0.4px; margin-bottom:20px;">Affection</div>
            <div class="titulo">Esse link já foi usado ou expirou.</div>
            <p class="sub">Volta no e-mail e clica de novo, ou pede um novo convite pra quem te cadastrou.</p>
            <a href="https://portal.affectionconsultoria.com.br/" style="display:block; text-align:center; margin-top:14px; color:#532137; text-decoration:underline; font-size:13px;">Ir pro portal</a>
        `;
        return;
    }

    // Pega nome da pessoa (pra saudacao carinhosa)
    const { data: pessoa } = await SB.from('pessoas').select('nome, apelido').eq('auth_id', session.user.id).maybeSingle();
    const nome = pessoa?.apelido || pessoa?.nome || (pessoa ? '' : (session.user.email || '').split('@')[0]);
    const primeiroNome = nome ? String(nome).split(' ')[0] : '';

    // Monta tela de criar senha (sem borboleta inventada — Thais nao gostou)
    document.getElementById('card').innerHTML = `
        <div style="text-align:center; font-family:'Fraunces',Georgia,serif; color:#532137; font-size:15px; font-weight:600; letter-spacing:0.4px; margin-bottom:20px;">Affection</div>
        <div class="titulo">Que bom ter você aqui${primeiroNome ? ', ' + primeiroNome : ''}.</div>
        <p class="sub">Cria uma senha sua — vai ser ela que você usa nos próximos acessos. Fica só com você.</p>

        <label class="label">Nova senha</label>
        <div class="campo">
            <input type="password" id="s1" placeholder="Mínimo 6 caracteres">
            <button type="button" class="olho" onclick="(function(){const i=document.getElementById('s1');i.type=i.type==='password'?'text':'password';})()"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>

        <label class="label">Confirme a senha</label>
        <div class="campo">
            <input type="password" id="s2" placeholder="Digite de novo">
            <button type="button" class="olho" onclick="(function(){const i=document.getElementById('s2');i.type=i.type==='password'?'text':'password';})()"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>

        <div class="erro" id="erro"></div>
        <button id="salvar" class="btn-pri">Salvar e entrar</button>
        <p class="disclaimer">Sua senha é só sua. A Affection nunca vai te pedir ela.</p>
    `;

    const s1 = document.getElementById('s1');
    const s2 = document.getElementById('s2');
    const btn = document.getElementById('salvar');
    const erro = document.getElementById('erro');

    s1.focus();
    s2.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); salvar(); } });
    btn.addEventListener('click', salvar);

    async function salvar() {
        erro.textContent = '';
        const v1 = s1.value, v2 = s2.value;
        if (v1.length < 6) { erro.textContent = 'A senha precisa ter pelo menos 6 caracteres.'; return; }
        if (v1 !== v2) { erro.textContent = 'As senhas não batem.'; return; }
        btn.disabled = true; btn.textContent = 'Salvando...';
        try {
            const { error } = await SB.auth.updateUser({ password: v1, data: { password_set: true } });
            if (error) { erro.textContent = 'Erro: ' + error.message; btn.disabled = false; btn.textContent = 'Salvar e entrar'; return; }
            // Sucesso — mostra confirmacao breve e redireciona pro portal
            document.getElementById('card').innerHTML = `
                <div class="sucesso">
                    <div class="ok">✓</div>
                    <div class="titulo">Pronto${primeiroNome ? ', ' + primeiroNome : ''}!</div>
                    <p class="sub">Sua senha foi salva. Te levando pro portal...</p>
                </div>
            `;
            setTimeout(() => { window.location.href = '/'; }, 1500);
        } catch (e) {
            erro.textContent = 'Erro inesperado: ' + (e?.message || e);
            btn.disabled = false; btn.textContent = 'Salvar e entrar';
        }
    }
})();
</script>
</body>
</html>
