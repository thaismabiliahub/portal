<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affection Portal</title>
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/borboleta.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#532137">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Affection">
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(){});});}</script>
<style>
html, body { margin: 0; padding: 0; height: 100%; background: #532137; }
.loader {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.8);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
}
.spinner {
    width: 24px; height: 24px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: rgba(255,255,255,0.85);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="loader"><div class="spinner"></div>Carregando</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script>
(async () => {
    try {
        const cfg = window.AFFECTION_CONFIG || {};
        if (!cfg.SUPABASE_URL || !cfg.SUPABASE_ANON_KEY) {
            window.location.replace('login.html');
            return;
        }
        const sb = supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
        const { data: { session } } = await sb.auth.getSession();
        if (!session) {
            window.location.replace('login.html');
            return;
        }
        // Sessão válida — redireciona pro app real
        window.location.replace('app.html');
    } catch (e) {
        window.location.replace('login.html');
    }
})();
</script>
</body>
</html>
