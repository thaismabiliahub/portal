<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#532137">
<title>Sem internet · Affection Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
    font-family:'DM Sans',sans-serif;
    background:linear-gradient(160deg,#faf8f6 0%,#f5efe6 100%);
    color:#1a1a18;
    display:flex;align-items:center;justify-content:center;
    text-align:center;padding:32px 24px;-webkit-font-smoothing:antialiased;
}
.box{max-width:340px;}
.borb{width:84px;height:84px;margin:0 auto 22px;display:block;object-fit:contain;opacity:.95;}
h1{font-family:'Fraunces',serif;font-size:26px;font-weight:600;color:#532137;margin-bottom:8px;}
p{font-size:14px;color:#6b6660;line-height:1.55;margin-bottom:24px;}
button{
    padding:13px 26px;border:none;border-radius:12px;
    background:#532137;color:#fff;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;
    transition:background .15s;
}
button:hover{background:#6a2a47;}
.dica{font-size:12px;color:#9a948c;margin-top:18px;}
</style>
</head>
<body>
<div class="box">
    <img class="borb" src="icons/borboleta.png" alt="Affection">
    <h1>Você está sem internet</h1>
    <p>Sem conexão no momento. Seus dados estão seguros — quando a internet voltar, é só recarregar.</p>
    <button onclick="location.reload()">Tentar de novo</button>
    <div class="dica">Affection Portal</div>
</div>
</body>
</html>
