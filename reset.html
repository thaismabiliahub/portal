<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affection Portal · Nova senha</title>
<link rel="icon" type="image/png" href="icons/borboleta.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#532137">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bordo: #532137;
    --rosa: #dd597d;
    --creme: #f5ede8;
    --creme-suave: #cfb8be;
    --card-bg: #3a1f29;
    --input-bg: rgba(255,255,255,0.05);
    --input-border: rgba(245,237,232,0.18);
    --erro: #fca5a5;
    --sucesso: #6ee7b7;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
    font-family: 'DM Sans', sans-serif;
    background: radial-gradient(ellipse at top, #2a0f17 0%, #1a070d 60%, #100509 100%);
    color: var(--creme);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
}
.card {
    background: var(--card-bg);
    border-radius: 20px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 6px 20px rgba(0,0,0,0.3);
    padding: 44px 38px;
    border: 1px solid rgba(245,237,232,0.08);
    position: relative;
}
.card::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 20px;
    padding: 1px;
    background: linear-gradient(135deg, rgba(245,237,232,0.4) 0%, rgba(221,89,125,0.2) 40%, rgba(83,33,55,0) 80%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
}
.brand { text-align: center; margin-bottom: 28px; }
.brand-mark { width: 64px; height: 64px; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; background: rgba(245,237,232,0.06); border-radius: 16px; border: 1px solid rgba(245,237,232,0.1); }
.brand-mark svg { width: 28px; height: 28px; color: var(--creme); }
.brand-titulo { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 600; color: var(--creme); line-height: 1; letter-spacing: -0.01em; }
.brand-sub { font-size: 10px; color: var(--creme-suave); margin-top: 8px; font-weight: 600; letter-spacing: 0.28em; text-transform: uppercase; }
h1 { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500; color: var(--creme); margin-bottom: 6px; }
.sub { font-size: 13px; color: var(--creme-suave); margin-bottom: 24px; }
.confirma-usuario { font-size: 12px; color: var(--creme-suave); margin-bottom: 18px; padding: 10px 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(245,237,232,0.08); border-radius: 8px; display: none; }
.confirma-usuario strong { color: var(--creme); }
.alerta { padding: 11px 14px; border-radius: 8px; font-size: 12px; margin-bottom: 18px; display: none; line-height: 1.5; }
.alerta.erro { background: rgba(252,165,165,0.08); border: 1px solid rgba(252,165,165,0.25); color: var(--erro); display: block; }
.alerta.sucesso { background: rgba(110,231,183,0.08); border: 1px solid rgba(110,231,183,0.25); color: var(--sucesso); display: block; }
.field { margin-bottom: 16px; }
label.field-label { display: block; font-size: 11px; font-weight: 600; color: var(--creme-suave); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 7px; }
.input-wrap { position: relative; }
input[type="password"], input[type="text"] { width: 100%; border: 1px solid var(--input-border); border-radius: 10px; padding: 12px 44px 12px 14px; font-size: 14px; font-family: inherit; background: var(--input-bg); color: var(--creme); transition: all 0.15s; }
input::placeholder { color: rgba(245,237,232,0.3); }
input:focus { outline: none; border-color: var(--rosa); background: rgba(255,255,255,0.08); box-shadow: 0 0 0 4px rgba(221,89,125,0.15); }
.toggle-eye { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: transparent; border: none; cursor: pointer; padding: 6px; color: var(--creme-suave); border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; }
.toggle-eye:hover { color: var(--creme); background: rgba(255,255,255,0.06); }
.toggle-eye svg { width: 18px; height: 18px; }
.regras { background: rgba(255,255,255,0.04); border: 1px solid rgba(245,237,232,0.08); border-radius: 10px; padding: 12px 14px; margin-bottom: 16px; font-size: 12px; color: var(--creme-suave); line-height: 1.7; }
.regras div { display: flex; align-items: center; gap: 7px; }
.regras div::before { content: '○'; color: var(--creme-suave); font-size: 14px; }
.regras div.ok { color: var(--sucesso); }
.regras div.ok::before { content: '✓'; color: var(--sucesso); }
.btn { width: 100%; padding: 13px 16px; border-radius: 10px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; border: none; background: var(--creme); color: #2a0f17; margin-top: 8px; transition: all 0.15s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
.btn:hover:not(:disabled) { background: white; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(245,237,232,0.15); }
.btn:disabled { opacity: 0.5; cursor: wait; transform: none; }
.foot { margin-top: 24px; padding-top: 18px; border-top: 1px solid rgba(245,237,232,0.08); text-align: center; font-size: 12px; }
.foot a { color: var(--creme-suave); text-decoration: none; border-bottom: 1px dashed rgba(207,184,190,0.4); }
.foot a:hover { color: var(--creme); border-bottom-color: var(--creme); }
</style>
</head>
<body>

<form id="formReset" class="card" autocomplete="off">
    <div class="brand">
        <div class="brand-mark">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <div class="brand-titulo">Affection Portal</div>
        <div class="brand-sub">Sistema Financeiro</div>
    </div>

    <h1>Nova senha</h1>
    <p class="sub">Defina uma nova senha pra acessar o portal.</p>

    <div id="confirmaUsuario" class="confirma-usuario">Trocando senha de <strong id="emailUsuario"></strong></div>
    <div id="alerta" class="alerta" role="alert"></div>

    <div class="field">
        <label class="field-label" for="senha">Nova senha</label>
        <div class="input-wrap">
            <input type="password" id="senha" required autocomplete="new-password" placeholder="Mínimo 8 caracteres">
            <button type="button" class="toggle-eye" onclick="toggleEye('senha')" aria-label="Mostrar senha">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
        </div>
    </div>

    <div class="field">
        <label class="field-label" for="confirma">Confirmar nova senha</label>
        <div class="input-wrap">
            <input type="password" id="confirma" required autocomplete="new-password" placeholder="Digite novamente">
            <button type="button" class="toggle-eye" onclick="toggleEye('confirma')" aria-label="Mostrar senha">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
        </div>
    </div>

    <div class="regras">
        <div id="r-len">Mínimo 8 caracteres</div>
        <div id="r-letra">Pelo menos uma letra</div>
        <div id="r-num">Pelo menos um número</div>
        <div id="r-igual">Senhas conferem</div>
    </div>

    <button type="submit" class="btn" id="btnSalvar">Alterar senha</button>

    <div class="foot">
        <a href="login.html">Voltar ao login</a>
    </div>
</form>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script>
const cfg = window.AFFECTION_CONFIG || {};
const sb = supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY, {
    auth: { detectSessionInUrl: true, flowType: 'implicit', autoRefreshToken: true, persistSession: true }
});

function toggleEye(id) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
}

function mostrarAlerta(tipo, msg) {
    const el = document.getElementById('alerta');
    el.className = 'alerta ' + tipo;
    el.textContent = msg;
}

function validarRegras() {
    const s = document.getElementById('senha').value;
    const c = document.getElementById('confirma').value;
    document.getElementById('r-len').className = s.length >= 8 ? 'ok' : '';
    document.getElementById('r-letra').className = /[a-zA-Z]/.test(s) ? 'ok' : '';
    document.getElementById('r-num').className = /[0-9]/.test(s) ? 'ok' : '';
    document.getElementById('r-igual').className = (s.length > 0 && s === c) ? 'ok' : '';
    return s.length >= 8 && /[a-zA-Z]/.test(s) && /[0-9]/.test(s) && s === c;
}
document.getElementById('senha').addEventListener('input', validarRegras);
document.getElementById('confirma').addEventListener('input', validarRegras);

document.getElementById('formReset').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!validarRegras()) {
        mostrarAlerta('erro', 'Confira as regras de senha antes de continuar.');
        return;
    }
    const btn = document.getElementById('btnSalvar');
    btn.disabled = true;
    btn.textContent = 'Salvando...';

    const novaSenha = document.getElementById('senha').value;

    // Confirma se tem sessão ativa antes do updateUser
    let sessionInfo = null;
    try {
        const { data } = await sb.auth.getSession();
        sessionInfo = data?.session || null;
    } catch (e) {}

    if (!sessionInfo) {
        // Tenta processar manualmente o hash da URL (caso o auto-detect tenha falhado)
        const hash = window.location.hash;
        if (hash && hash.includes('access_token')) {
            const params = new URLSearchParams(hash.substring(1));
            const at = params.get('access_token');
            const rt = params.get('refresh_token');
            if (at && rt) {
                try {
                    const { data, error: setErr } = await sb.auth.setSession({ access_token: at, refresh_token: rt });
                    if (!setErr && data?.session) sessionInfo = data.session;
                } catch (e) { console.error('setSession falhou:', e); }
            }
        }
    }

    if (!sessionInfo) {
        mostrarAlerta('erro', 'Sessão de recuperação não foi estabelecida. O link pode ter expirado ou já foi usado. Solicite um novo no login.');
        btn.disabled = false;
        btn.textContent = 'Alterar senha';
        return;
    }

    const { data, error } = await sb.auth.updateUser({ password: novaSenha });

    if (error) {
        mostrarAlerta('erro', 'Erro ao alterar: ' + (error.message || 'desconhecido') + '. Tente solicitar nova recuperação.');
        console.error('updateUser error:', error);
        btn.disabled = false;
        btn.textContent = 'Alterar senha';
        return;
    }
    mostrarAlerta('sucesso', 'Senha alterada com sucesso! Redirecionando pro login...');
    setTimeout(() => { window.location.href = 'login.html'; }, 1800);
});

// Sempre permite tentar criar senha. Mostra mensagem só se Supabase mandou erro explícito.
window.addEventListener('load', async () => {
    const hash = window.location.hash || '';
    const query = window.location.search || '';

    if (hash.includes('error=') || query.includes('error=')) {
        const params = new URLSearchParams(hash.startsWith('#') ? hash.substring(1) : (query.startsWith('?') ? query.substring(1) : ''));
        const desc = params.get('error_description') || params.get('error_code') || '';
        const descTraduzido = desc.includes('expired') ? 'O link expirou. Solicite um novo em "Esqueci minha senha".'
                            : desc.includes('invalid') ? 'O link é inválido. Solicite um novo.'
                            : (desc.replace(/\+/g, ' ') || 'Link com problema. Solicite um novo.');
        mostrarAlerta('erro', descTraduzido);
    }

    await new Promise(r => setTimeout(r, 600));
    try {
        const { data: { session } } = await sb.auth.getSession();
        if (session && session.user && session.user.email) {
            document.getElementById('emailUsuario').textContent = session.user.email;
            document.getElementById('confirmaUsuario').style.display = 'block';
        }
    } catch (e) { console.warn('getSession:', e); }
});
</script>

</body>
</html>
